<DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Multiverse AI – Jemini Input Box (no tone)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Font Awesome (icons) -->
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- MARKDOWN‑IT (for rendering bot messages) -->
<script src="https://cdn.jsdelivr.net/npm/markdown-it@13/dist/markdown-it.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markdown-it-emoji@2/dist/markdown-it-emoji.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markdown-it-footnote@3/dist/markdown-it-footnote.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markdown-it-sub@1/dist/markdown-it-sub.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markdown-it-sup@1/dist/markdown-it-sup.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markdown-it-mark@3/dist/markdown-it-mark.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markdown-it-container@3/dist/markdown-it-container.min.js"></script>

<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
/* -------------------------------------------------- */
/*  GLOBAL VARIABLES – Multiverse colours & Jemini UI   */
/* -------------------------------------------------- */
:root{
    /* Multiverse theme */
    --primary:#9162B3;
    --primary-dark:#7a4f99;
    --bg-page:#f4f7f6;
    --bg-chat:#fff;
    --bg-bot:#f0f2f5;
    --bg-user:linear-gradient(135deg,#9162B3,#7a4f99);
    --radius:20px;
    --max-w:900px;
    --shadow:0 8px 24px rgba(0,0,0,0.08);
    --font-sans:"Google Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;

    /* Jemini UI colours (kept unchanged) */
    --bg-main:#ffffff;
    --bg-sidebar:#f0f4f9;
    --sidebar-hover:#e1e5ea;
    --text-primary:#1f1f1f;
    --text-secondary:#444746;
    --input-pill-bg:#f0f4f9;
    --blue-accent:#0b57d0;
    --border-color:#dee2e6;
}

/* -------------------------------------------------- */
/*  PAGE LAYOUT                                      */
/* -------------------------------------------------- */
body{
    font-family:var(--font-sans);
    background:var(--bg-page);
    margin:0;
    padding:20px;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    box-sizing:border-box;
}
#chatTitle{
    font-size:2rem;
    font-weight:700;
    margin:0 0 20px;
    color:#2A0645;
    text-align:center;
}
.chat-app{
    width:100%;
    max-width:var(--max-w);
    height:75vh;
    min-height:500px;
    background:var(--bg-chat);
    border-radius:16px;
    box-shadow:var(--shadow);
    display:flex;
    flex-direction:column;
    overflow:hidden;
    position:relative;          /* for pill‑label positioning */
}
#chat{
    flex-grow:1;
    padding:20px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:16px;
}
#chat::-webkit-scrollbar{width:6px;}
#chat::-webkit-scrollbar-thumb{background:#ddd;border-radius:10px;}

/* -------------------------------------------------- */
/*  MESSAGE BUBBLES                                  */
/* -------------------------------------------------- */
.message{
    max-width:80%;
    padding:12px 18px;
    border-radius:var(--radius);
    line-height:1.5;
    font-size:1rem;
    word-break:break-word;
}
.bot{
    align-self:flex-start;
    background:var(--bg-bot);
    color:#111;
    border-bottom-left-radius:4px;
}
.user{
    align-self:flex-end;
    background:var(--bg-user);
    color:#fff;
    border-bottom-right-radius:4px;
}
.bot-typing{
    display:flex;
    align-items:center;
    gap:10px;
    font-style:italic;
    color:#666;
}
.bot-typing i{color:var(--primary);}

/* -------------------------------------------------- */
/*  INPUT AREA – EXACT COPY FROM JEMINI              */
/* -------------------------------------------------- */
.input-wrapper{
    position:absolute;
    bottom:50px;
    left:0; right:0;
    transform:translateY(0);
    padding:0 15% 30px 15%;
    background:transparent;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    transition:all 1.5s ease-out;
    z-index:10;
}
.input-wrapper.slide-down{
    bottom:0;
    background:none;
}
.input-pill{
    background:var(--input-pill-bg);
    border-radius:32px;
    padding:8px 24px;
    display:flex;
    flex-direction:column;
    border:1px solid var(--border-color);
    width:90%;
    position:relative;
}
#chatIn{
    background:transparent;
    border:none;
    outline:none;
    font-size:16px;
    width:100%;
    color:var(--text-primary);
    font-family:inherit;
    resize:none;
    min-height:20px;
    margin:8px 0;
}
.pill-bottom-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:8px;
}
.left-controls{
    display:flex;
    align-items:center;
    gap:4px;
    /* Keep a tiny minimum width so the flex container does not collapse
       when the Tools button is removed. */
    min-width:40px;
}
.char-counter{
    font-size:11px;
    color:var(--text-secondary);
    opacity:.7;
    margin-right:10px;
}
.icon-btn{
    color:var(--text-secondary);
    cursor:pointer;
    font-size:18px;
    padding:8px;
    border-radius:50%;
}
.icon-btn:hover{background:var(--sidebar-hover);}
.fas-fa-cog{padding-left:10px !important;}

/* -------------------------------------------------- */
/*  DROPDOWNS (PLUS)                                 */
/* -------------------------------------------------- */
.dropdown-container{
    position:relative;
    display:inline-block;
}
.dropdown-menu{
    position:absolute;
    bottom:50px;
    left:0;
    background:var(--bg-sidebar);
    border:1px solid var(--border-color);
    border-radius:12px;
    padding:8px 0;
    min-width:200px;
    display:none;
    z-index:1000;
    box-shadow:0 8px 24px rgba(0,0,0,.15);
}
.dropdown-item{
    padding:10px 16px;
    font-size:14px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:12px;
    color:var(--text-primary);
}
.dropdown-item:hover{background:var(--sidebar-hover);}

/* -------------------------------------------------- */
/*  MODEL SELECTOR (JEMINI)                           */
/* -------------------------------------------------- */
.model-selector{
    position:relative;
    display:inline-block;
}
#model-select{
    appearance:none;
    -webkit-appearance:none;
    -moz-appearance:none;
    background:var(--input-pill-bg);
    border:1px solid var(--border-color);
    border-radius:20px;
    padding:8px 12px;
    font-family:"Google Sans","Roboto",sans-serif;
    font-size:13px;
    color:var(--text-primary);
    cursor:pointer;
    padding-right:36px;
    background-image:url("data:image/svg+xml;utf8,<svg fill='gray' height='12' viewBox='0 0 24 24' width='12' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>");
    background-repeat:no-repeat;
    background-position:right 8px center;
    background-size:12px;
    transition:border-color .2s,box-shadow .2s;
}
#model-select:hover{
    border-color:var(--blue-accent);
    box-shadow:0 0 0 2px rgba(11,87,208,.2);
}
#model-select:focus{outline:none;}
.model-label{
    font-size:13px;
    color:var(--text-secondary);
    cursor:pointer;
    padding:8px 12px;
    border-radius:20px;
    display:flex;
    align-items:center;
    gap:6px;
    transition:all .2s;
}
.model-label:hover{background:var(--sidebar-hover);}
.model-dropdown{
    position:absolute;
    bottom:50px;
    right:0;
    background:var(--bg-sidebar);
    border:1px solid var(--border-color);
    border-radius:12px;
    padding:8px 0;
    min-width:220px;
    display:none;
    z-index:1000;
    box-shadow:0 8px 24px rgba(0,0,0,.15);
}
.model-option{
    padding:12px 16px;
    font-size:13px;
    cursor:pointer;
    color:var(--text-primary);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    transition:background .2s;
}
.model-option:hover{background:var(--sidebar-hover);}
.model-option.active{color:var(--blue-accent);}
.model-option-title{font-weight:500;}
.model-option-desc{
    font-size:11px;
    color:var(--text-secondary);
    display:block;
    margin-top:2px;
}
.checkmark{
    font-size:16px;
    color:var(--blue-accent);
    display:none;
}
.checkmark.show{display:inline;}

/* -------------------------------------------------- */
/*  SEND BUTTON                                       */
/* -------------------------------------------------- */
.send-btn{
    color:var(--blue-accent);
    opacity:.3;
    pointer-events:none;
    cursor:pointer;
    font-size:20px;
}
.send-btn.ready{
    opacity:1;
    pointer-events:auto;
}

/* -------------------------------------------------- */
/*  DISCLAIMER                                         */
/* -------------------------------------------------- */
.disclaimer{
    text-align:center;
    font-size:12px;
    color:var(--text-secondary);
    margin-top:14px;
    width:100%;
    display:block;
}

/* -------------------------------------------------- */
/*  MARKDOWN‑IT CODE HIGHLIGHT                        */
/* -------------------------------------------------- */
.message pre{
    background:#1e1e1e;
    color:#f8f8f2;
    padding:1em;
    border-radius:8px;
    overflow-x:auto;
    font-family:monospace;
    font-size:.9rem;
    margin:10px 0;
}

/* -------------------------------------------------- */
/*  PILL‑LABEL STYLES (JEMINI‑LIKE)                   */
/* -------------------------------------------------- */
#pillLabelsContainer{
    position:absolute;
    top:8px;
    left:10px;
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    z-index:20;
}
.pill-label{
    background:#e0e0e0;
    color:#333;
    border-radius:12px;
    padding:4px 10px;
    font-size:12px;
    display:flex;
    align-items:center;
}
.pill-label span{
    margin-left:6px;
    cursor:pointer;
    font-weight:bold;
}

/* -------------------------------------------------- */
/*  SOME MODALS FROM JEMINI (kept hidden, not used)   */
/* -------------------------------------------------- */
.modal{
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.8);
    z-index:2000;
    display:none;
    align-items:center;
    justify-content:center;
}
.modal-content{
    background:var(--bg-sidebar);
    padding:40px;
    border-radius:20px;
    text-align:center;
    width:450px;
    border:1px solid var(--border-color);
    color:var(--text-primary);
    box-shadow:0 20px 60px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<h2 id="chatTitle">Multiverse AI</h2>

<div class="chat-app">
    <!-- ---------- CHAT DISPLAY ---------- -->
    <div id="chat"></div>

    <!-- ---------- INPUT AREA (JEMINI copy) ---------- -->
    <div class="input-wrapper">
        <div class="input-pill">
            <!-- Pill‑label container (top‑left of the input) -->
            <div id="pillLabelsContainer"></div>

            <textarea id="chatIn"
                      placeholder="Ask Multiverse"
                      rows="1"
                      oninput="handleInput(this)"
                      onkeydown="handleKey(event)"></textarea>

            <div class="pill-bottom-row">
                <div class="left-controls">

                    <!-- + MENU -->
                    <div class="dropdown-container">
                        <i class="fas fa-plus icon-btn"
                           onclick="toggleMenu('plusMenu',event)"></i>
                        <div id="plusMenu" class="dropdown-menu">
                            <div class="dropdown-item"
                                 onclick="document.getElementById('fileInput').click()">
                                <i class="fas fa-file-upload"></i> Upload Files
                            </div>
                            <div class="dropdown-item"
                                 onclick="addPhotos()">
                                <i class="fas fa-images"></i> Photos
                            </div>
                            <div class="dropdown-item"
                                 onclick="openNotebookLM()">
                                <i class="fas fa-book"></i> NotebookLM
                            </div>
                        </div>
                        <input type="file"
                               id="fileInput"
                               style="display:none"
                               onchange="handleFileUpload(this)">
                    </div>

                </div>

                <!-- RIGHT‑SIDE CONTROLS -->
                <div style="display:flex;gap:8px;align-items:center">
                    <span class="char-counter" id="charCount">0 characters</span>

                    <!-- MODEL SELECTOR (Fast / Thinking / Pro) -->
                    <div class="model-selector">
                        <div class="model-label"
                             onclick="toggleModelDropdown(event)">
                            <span id="currentModel">Fast</span>
                            <i class="fas fa-chevron-down"
                               style="font-size:12px"></i>
                        </div>
                        <div id="modelDropdown" class="model-dropdown">
                            <div class="model-option active"
                                 onclick="selectModel('fast',event)"
                                 data-model="fast">
                                <div>
                                    <div class="model-option-title">Fast</div>
                                    <div class="model-option-desc">Answers quickly</div>
                                </div>
                                <span class="checkmark show">✓</span>
                            </div>
                            <div class="model-option"
                                 onclick="selectModel('thinking',event)"
                                 data-model="thinking">
                                <div>
                                    <div class="model-option-title">Thinking</div>
                                    <div class="model-option-desc">Solves complex problems</div>
                                </div>
                                <span class="checkmark">✓</span>
                            </div>
                            <div class="model-option"
                                 onclick="selectModel('pro',event)"
                                 data-model="pro">
                                <div>
                                    <div class="model-option-title">Pro</div>
                                    <div class="model-option-desc">
                                        Thinks longer for advanced math & code
                                    </div>
                                </div>
                                <span class="checkmark">✓</span>
                            </div>
                        </div>
                    </div>

                    <!-- MICROPHONE (speech) -->
                    <i class="fas fa-microphone icon-btn"
                       id="micBtn"
                       onclick="toggleSpeech()"></i>

                    <!-- SEND BUTTON -->
                    <i class="fas fa-paper-plane send-btn"
                       id="sendBtn"
                       onclick="sendChat()"></i>
                </div>
            </div>
        </div>

        <p class="disclaimer">
            Multiverse can make mistakes, so double‑check it.
        </p>
    </div>
</div>

<!-- --------------------------------------------------- -->
<!-- ----------  FULL JEMINI SCRIPT (unchanged)  --------- -->
<!-- --------------------------------------------------- -->
<script>
/* ----------------------------------------------------------- */
/*  EVERYTHING THAT WAS INSIDE THE <script> TAG OF YOUR JEMINI   */
/* ----------------------------------------------------------- */

const G_KEY = "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";
let lastUserMessage = "";
let recognition = null;
let currentModel = "fast";          // fast / thinking / pro
let currentTone  = "balanced";      // (tone is now unused – kept for compatibility)

/* ----------------- PILL‑LABEL LOGIC (JEMINI) ----------------- */
const pillContainer = document.getElementById('pillLabelsContainer');
const activePills = {};   // track which pills are shown

function addToolPill(label){
    if (activePills[label]) return;        // avoid duplicates
    activePills[label] = true;

    const pill = document.createElement('div');
    pill.className = 'pill-label';
    pill.setAttribute('data-label', label);
    pill.innerHTML = `${label}<span onclick="removeToolPill('${label}')">&times;</span>`;
    pillContainer.appendChild(pill);
}
function removeToolPill(label){
    delete activePills[label];
    const pills = pillContainer.querySelectorAll('.pill-label');
    pills.forEach(p => {
        if (p.getAttribute('data-label') === label) p.remove();
    });
}

/* ----------------- MARKDOWN‑IT (bot rendering) ----------------- */
const md = window.markdownit({html:false,linkify:true,typographer:true})
          .use(window.markdownitEmoji)
          .use(window.markdownitFootnote)
          .use(window.markdownitSub)
          .use(window.markdownitSup)
          .use(window.markdownitMark)
          .use(window.markdownitContainer,'warning');

/* ----------------- INPUT HANDLING ----------------- */
function handleInput(el){
    el.style.height = "auto";
    el.style.height = (el.scrollHeight) + "px";
    document.getElementById('sendBtn')
            .classList.toggle('ready', el.value.trim().length > 0);
    document.getElementById('charCount')
            .innerText = `${el.value.length} characters`;
}
function handleKey(e){
    if (e.key === "Enter" && !e.shiftKey){
        e.preventDefault();
        sendChat();
    }
}

/* ----------------- MENU LOGIC (PLUS) ----------------- */
function toggleMenu(menuId, event){
    event.stopPropagation();
    const menu = document.getElementById(menuId);
    const isVisible = menu.style.display === 'block';
    // close all other menus first
    document.querySelectorAll('.dropdown-menu')
            .forEach(m=>m.style.display='none');
    document.getElementById('modelDropdown').style.display='none';
    menu.style.display = isVisible ? 'none' : 'block';
}

/* ----------------- MODEL SELECTOR ----------------- */
function toggleModelDropdown(event){
    event.stopPropagation();
    const dropdown = document.getElementById('modelDropdown');
    const isVisible = dropdown.style.display === 'block';
    // close other menus first
    document.querySelectorAll('.dropdown-menu')
            .forEach(m=>m.style.display='none');
    dropdown.style.display = isVisible ? 'none' : 'block';
}
function selectModel(model, event){
    event.stopPropagation();
    currentModel = model;
    document.getElementById('currentModel')
            .innerText = model.charAt(0).toUpperCase() + model.slice(1);
    // update UI check‑marks
    document.querySelectorAll('.model-option')
            .forEach(opt=>{
                const active = opt.dataset.model === model;
                opt.classList.toggle('active',active);
                const chk = opt.querySelector('.checkmark');
                if (chk) chk.classList.toggle('show',active);
            });
    document.getElementById('modelDropdown').style.display='none';
}

/* ----------------- SPEECH (stub) ----------------- */
if ('webkitSpeechRecognition' in window){
    recognition = new webkitSpeechRecognition();
    recognition.onstart = () => document.getElementById('micBtn').style.color = "#ea4335";
    recognition.onend   = () => document.getElementById('micBtn').style.color = "";
    recognition.onresult = (e)=>{
        document.getElementById('chatIn').value += e.results[0][0].transcript;
        handleInput(document.getElementById('chatIn'));
    };
}
function toggleSpeech(){ if (recognition) recognition.start(); }

/* ----------------- LOADING INDICATOR ----------------- */
function showLoading(id){
    const div = document.createElement('div');
    div.className = 'message bot bot-typing';
    div.id = id;
    div.innerHTML = `<i class="fas fa-robot fa-spin"></i> Bot is thinking...`;
    document.getElementById('chat').appendChild(div);
    scrollToBottom();
}
function hideLoading(id){
    const el = document.getElementById(id);
    if (el) el.remove();
}

/* ----------------- MESSAGE APPEND ----------------- */
function addMessage(text, who, raw = false){
    const div = document.createElement('div');
    div.className = `message ${who}`;
    if (who === 'bot'){
        div.innerHTML = raw ? text : md.render(text);
    }else{
        div.textContent = text;
    }
    document.getElementById('chat').appendChild(div);
    scrollToBottom();
}

/* ----------------- SCROLL TO BOTTOM ----------------- */
function scrollToBottom(){
    const chat = document.getElementById('chat');
    chat.scrollTop = chat.scrollHeight;
}

/* ----------------- MAP MODEL NAMES → GROQ IDs ----------------- */
function getGroqModelName(model){
    switch(model){
        case "fast":      return "llama-3.3-70b-versatile";
        case "thinking":  return "mixtral-8x7b-32768";
        case "pro":       return "llama-3.1-405b-reasoning";
        default:          return "llama-3.3-70b-versatile";
    }
}

/* ----------------- MAIN SEND FUNCTION ----------------- */
async function sendChat(isRegenerate = false){
    const input = document.getElementById('chatIn');
    const text = isRegenerate ? lastUserMessage : input.value.trim();
    if (!text) return;

    /* ---- SLIDE‑DOWN ANIMATION (kept from Jemini) ---- */
    const wrapper = document.querySelector('.input-wrapper');
    if (wrapper && !wrapper.classList.contains('slide-down')){
        setTimeout(()=>wrapper.classList.add('slide-down'),400);
    }

    if (!isRegenerate){
        lastUserMessage = text;
        addMessage(text,'user');
        input.value = '';
        handleInput(input);
    }

    // If any tool pills are active, add them to the system prompt (optional)
    const activeToolText = Object.keys(activePills).length
        ? "\n\n[Active tools: " + Object.keys(activePills).join(", ") + "]"
        : "";

    const loadId = 'loading-' + Date.now();
    showLoading(loadId);

    const systemPrompt = `You are Multiverse, a helpful AI assistant. Tone: ${currentTone}.${activeToolText}`;

    const payload = {
        model: getGroqModelName(currentModel),
        messages:[
            {role:"system",content:systemPrompt},
            {role:"user",content:text}
        ],
        temperature:0.7
    };

    try{
        const resp = await fetch('https://api.groq.com/openai/v1/chat/completions',{
            method:'POST',
            headers:{
                Authorization:`Bearer ${G_KEY}`,
                'Content-Type':'application/json'
            },
            body:JSON.stringify(payload)
        });

        hideLoading(loadId);

        if (!resp.ok){
            const err = await resp.text();
            addMessage(`⚠️ API error ${resp.status}: ${err}`,'bot');
            return;
        }

        const data = await resp.json();
        const reply = data.choices[0].message.content.trim();
        addMessage(reply,'bot');
    }catch(e){
        hideLoading(loadId);
        addMessage(`⚠️ Connection error: ${e.message}`,'bot');
    }
}

/* ----------------- PLACEHOLDER FUNCTIONS (kept) ----------------- */
function handleFileUpload(input){ /* stub – implement if needed */ }
function addPhotos(){ /* stub */ }
function openNotebookLM(){ /* stub */ }

/* ----------------- CLOSE DROPDOWNS ON OUTSIDE CLICK ----------------- */
window.onclick = function(e){
    if (!e.target.closest('.dropdown-container')){
        document.querySelectorAll('.dropdown-menu')
                .forEach(m=>m.style.display='none');
    }
    if (!e.target.closest('.model-selector')){
        document.getElementById('modelDropdown').style.display='none';
    }
};

/* ----------------- FOCUS TEXTAREA ON LOAD ----------------- */
document.addEventListener('DOMContentLoaded',()=> {
    document.getElementById('chatIn').focus();
});
</script>

</body>
</html>
