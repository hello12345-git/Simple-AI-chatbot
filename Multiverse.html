<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiverse AI</title>

<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/markdown-it@13/dist/markdown-it.min.js"></script>

<style>
  :root {
    --bg-page: #ffffff;
    --text-main: #1f1f1f;
    --text-muted: #444746;
    --font-sans: "Google Sans", "Inter", "Segoe UI", sans-serif;
    --accent-blue: #1a73e8;
    --user-bubble: #f0f4f9;
  }

  body {
    font-family: var(--font-sans);
    background: var(--bg-page);
    color: var(--text-main);
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  /* --- HEADER --- */
  header {
    width: 100%;
    padding: 12px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-sizing: border-box;
  }

  .header-center {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .header-title { font-weight: 500; font-size: 1.1rem; color: #5f6368; }
  .header-subtitle { font-size: 0.9rem; color: var(--text-muted); }
  .header-icon { color: #5f6368; font-size: 1.2rem; cursor: pointer; }

  /* --- CHAT AREA --- */
  #chat {
    width: 100%;
    max-width: 820px;
    flex: 1;
    overflow-y: auto;
    padding: 20px 20px 40px 20px;
    display: flex;
    flex-direction: column;
    gap: 32px;
    box-sizing: border-box;
  }

  /* --- MESSAGE WRAPPERS --- */
  .message-wrapper {
    display: flex;
    gap: 16px;
    width: 100%;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .icon-col {
    width: 24px;
    flex-shrink: 0;
    display: flex;
    justify-content: center;
  }

  .sparkle-icon { color: #4285f4; font-size: 1.4rem; margin-top: 2px; }

  .content-col {
    flex: 1;
    max-width: 100%;
    overflow-x: hidden;
  }

  /* --- USER MESSAGE --- */
  .user-wrapper { justify-content: flex-end; }
  .user-content {
    background: var(--user-bubble);
    padding: 12px 20px;
    border-radius: 24px;
    max-width: 75%;
    font-size: 1rem;
    line-height: 1.5;
  }

  /* --- BOT MESSAGE --- */
  .bot-content {
    font-size: 1rem;
    line-height: 1.7;
    color: var(--text-main);
  }

  /* Bot Markdown Styling */
  .bot-content p { margin: 0 0 16px 0; }
  .bot-content h3 { font-size: 1.1rem; font-weight: 500; margin: 0 0 12px 0; }
  .bot-content ul { padding-left: 20px; margin: 0 0 16px 0; }
  .bot-content li { margin-bottom: 12px; }
  .bot-content strong { font-weight: 600; }
  
  /* The Horizontal Rule */
  .bot-content hr {
    border: 0;
    border-top: 1px solid #e3e3e3;
    margin: 24px 0 16px 0;
  }

  /* --- ACTION ICONS (Like, Copy, etc) --- */
  .action-bar {
    display: flex;
    gap: 16px;
    margin-top: 8px;
    color: var(--text-muted);
    font-size: 1.1rem;
  }
  .action-bar i { cursor: pointer; transition: color 0.2s; }
  .action-bar i:hover { color: var(--accent-blue); }

  /* --- THINKING ANIMATION --- */
  .typing { display: flex; gap: 4px; padding: 10px 0; }
  .typing span { width: 6px; height: 6px; background: #9aa0a6; border-radius: 50%; animation: bounce 1.4s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

  /* --- INPUT AREA --- */
  .input-section {
    width: 100%;
    max-width: 820px;
    padding: 10px 20px 20px 20px;
    box-sizing: border-box;
    background: var(--bg-page);
  }

  .input-pill {
    background: var(--user-bubble);
    border-radius: 32px;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .input-pill .fa-plus { color: var(--text-muted); font-size: 1.2rem; cursor: pointer; }

  #userInput {
    flex: 1;
    border: none;
    background: transparent;
    padding: 10px 0;
    font-size: 1rem;
    outline: none;
    font-family: var(--font-sans);
  }

  #sendBtn {
    background: transparent;
    border: none;
    color: var(--text-main);
    cursor: pointer;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .disclaimer {
    text-align: center;
    font-size: 0.75rem;
    color: #70757a;
    margin-top: 12px;
  }
</style>
</head>
<body>

<header>
  <i class="fas fa-bars header-icon"></i>
  <div class="header-center">
    <div class="header-title">Multiverse AI</div>
  </div>
  <i class="fas fa-ellipsis-v header-icon"></i>
</header>

<div id="chat"></div>

<div class="input-section">
  <div class="input-pill">
    <i class="fas fa-plus"></i>
    <input type="text" id="userInput" placeholder="Ask me anything..." autocomplete="off" autofocus>
    <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
  </div>
  <div class="disclaimer">Multiverse AI isn't human. It can make mistakes, so double-check it.</div>
</div>

<script>
/* ⚠️ PASTE YOUR NEW API KEY HERE. THE OLD ONE WAS EXPOSED. */
const GROQ_API_KEY = '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'; 
const MODEL = 'llama-3.3-70b-versatile';

const md = window.markdownit({ html: false, linkify: true, typographer: true });
const chatEl = document.getElementById('chat');
const userInp = document.getElementById('userInput');

/* --- THE SYSTEM PROMPT (Forces the AI to format like the image) --- */
const messages = [
  { 
    role: "system", 
    content: `You are Multiverse AI. Format your responses naturally:
    1. If providing lists or facts, use bullet points.
    2. Do NOT bold the start of bullet points or sentences unless it is truly necessary for emphasis.
    3. Use a clean, conversational tone without forced formatting.
    4. When finished with the main info, insert a horizontal rule (---).
    5. After the rule, ask a single, polite follow-up question.
    6. Write good code.`
  }
];

function addMessage(text, who) {
  const wrapper = document.createElement('div');
  wrapper.className = `message-wrapper ${who === 'user' ? 'user-wrapper' : ''}`;

  if (who === 'bot') {
    // Builds the bot response with the sparkle icon and action bar
    wrapper.innerHTML = `
      <div class="icon-col">
        <i class="fas fa-sparkles sparkle-icon"></i>
      </div>
      <div class="content-col">
        <div class="bot-content">${md.render(text)}</div>
        <div class="action-bar">
          <i class="far fa-thumbs-up"></i>
          <i class="far fa-thumbs-down"></i>
          <i class="fas fa-redo"></i>
          <i class="far fa-copy" onclick="copyText(this)"></i>
          <i class="fas fa-ellipsis-v"></i>
        </div>
      </div>
    `;
  } else {
    // Builds the user pill
    wrapper.innerHTML = `<div class="user-content">${text}</div>`;
  }

  chatEl.appendChild(wrapper);
  chatEl.scrollTop = chatEl.scrollHeight;
}

// Simple function to copy text
function copyText(iconElement) {
  const contentDiv = iconElement.closest('.content-col').querySelector('.bot-content');
  navigator.clipboard.writeText(contentDiv.innerText).then(() => {
    iconElement.classList.replace('far', 'fas');
    setTimeout(() => iconElement.classList.replace('fas', 'far'), 2000);
  });
}

async function sendMessage() {
  const userText = userInp.value.trim();
  if (!userText) return;

  addMessage(userText, 'user');
  userInp.value = '';
  messages.push({ role: "user", content: userText });

  // Add Thinking Animation
  const typingWrapper = document.createElement('div');
  typingWrapper.className = 'message-wrapper';
  typingWrapper.innerHTML = `
    <div class="icon-col"><i class="fas fa-sparkles sparkle-icon"></i></div>
    <div class="content-col"><div class="typing"><span></span><span></span><span></span></div></div>
  `;
  chatEl.appendChild(typingWrapper);
  chatEl.scrollTop = chatEl.scrollHeight;

  try {
    const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        Authorization: `Bearer ${GROQ_API_KEY}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ model: MODEL, messages, temperature: 0.7, max_tokens: 1000 })
    });

    const data = await resp.json();
    chatEl.removeChild(typingWrapper);
    
    if (data.choices && data.choices.length > 0) {
      const reply = data.choices[0].message.content;
      addMessage(reply, 'bot');
      messages.push({ role: "assistant", content: reply });
    } else {
      throw new Error("Invalid API response");
    }

  } catch (e) {
    if(typingWrapper.parentNode) chatEl.removeChild(typingWrapper);
    addMessage("⚠️ Error: " + e.message, 'bot');
  }
}

document.getElementById('sendBtn').addEventListener('click', sendMessage);
userInp.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
